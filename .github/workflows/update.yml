
name: 🔄 Daily Price Update

on:
  schedule:
    - cron: '0 1 * * *'   # 08:00 AM Hà Nội (UTC+7 = 01:00 UTC)
  workflow_dispatch:        # Cho phép chạy thủ công từ GitHub UI

permissions:
  contents: write           # Cần quyền write để git commit

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run update script
        run: python src/main.py

      - name: 💾 Commit & Push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/prices.json assets/
          git diff --staged --quiet || git commit -m "📊 Auto-update: $(date +'%Y-%m-%d %H:%M UTC')"
          git push
